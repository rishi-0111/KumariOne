version: '3.8'

services:
  db:
    image: postgis/postgis:15-3.4
    environment:
      POSTGRES_DB: kumarione_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ../database:/docker-entrypoint-initdb.d # Loads schema.sql automatically on startup

  backend:
    build: ../backend
    ports:
      - "5000:5000"
    environment:
      - DB_USER=admin
      - DB_PASSWORD=password123
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=kumarione_db
    depends_on:
      - db

  ai-services:
    build: ../ai-services
    ports:
      - "8000:8000"
    depends_on:
      - db

volumes:
  pgdata:
